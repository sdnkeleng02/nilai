    <style>
        /* Menghilangkan margin bawaan browser dan membuat halaman penuh */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Mencegah munculnya scrollbar ganda */
            background-color: #ffffff;
        }
        
        /* Membuat iframe memenuhi 100% layar tanpa garis tepi */

            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
